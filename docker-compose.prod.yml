# DigitalVaultStore - Production 環境(本機模擬版)
#
# 與開發版(docker-compose.yml)的差異:
#   - SQL Server 容器化(含 volume 持久化),不再連 Windows 主機
#   - 前端 build 成靜態檔,由 Nginx 服務(非 Vite dev server)
#   - Nginx 當統一入口(80 埠),/api 反向代理到後端
#   - 後端切 Production 模式
#   - 密碼等機密改用 .env.prod(不寫死在此檔)
#
# 用法:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  # ---------- Nginx:統一入口 + 反向代理 ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: dvs-nginx
    ports:
      - "80:80"
      # - "443:443"    # 之後上 HTTPS 時再開啟
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 之後上 HTTPS 憑證時掛載:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - dvs-prod-net
    restart: unless-stopped

  # ---------- 前端:build 成靜態檔,由自身的 Nginx 服務 ----------
  frontend:
    build:
      context: ./FrontEnd/digital-vault
      dockerfile: Dockerfile.prod
    container_name: dvs-frontend
    networks:
      - dvs-prod-net
    restart: unless-stopped

  # ---------- 後端:ASP.NET Core (Production) ----------
  backend:
    build:
      context: ./BackEnd/DigitalProject
      dockerfile: Dockerfile
    container_name: dvs-backend
    environment:
      - Cors__AllowedOrigin=http://localhost
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      # 連容器化的 SQL Server(用服務名 sqlserver 當主機名)
      - ConnectionStrings__DbContext=Server=sqlserver,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Redis__ConnectionString=redis:6379
    depends_on:
      - sqlserver
      - redis
    networks:
      - dvs-prod-net
    restart: unless-stopped

  # ---------- SQL Server 容器 ----------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dvs-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer          # Developer 版免費;正式營運需改授權版本
    ports:
      - "1433:1433"                  # 對外映射,方便你用 SSMS 連進去管理(正式環境可移除)
    volumes:
      - mssql-data:/var/opt/mssql    # 資料持久化:容器刪了資料還在
    networks:
      - dvs-prod-net
    restart: unless-stopped

  # ---------- Redis 快取 ----------
  redis:
    image: redis:7-alpine
    container_name: dvs-redis
    networks:
      - dvs-prod-net
    restart: unless-stopped

networks:
  dvs-prod-net:
    driver: bridge

volumes:
  mssql-data:      # 具名 volume,SQL Server 資料存這裡,不隨容器刪除
